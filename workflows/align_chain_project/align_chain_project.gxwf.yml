class: GalaxyWorkflow
label: WF-C align_chain_project (one-click, native collection ops)
license: MIT
creator:
- class: Person
  identifier: https://orcid.org/0000-0002-5987-8032
  name: Anton Nekrutenko
- class: Person
  name: Claude Opus 4.8
release: '0.2'
doc: 'Phase C end-to-end as a SINGLE map-over with native Galaxy collection operations (no custom helpers).
  Chain block: CROSS_PRODUCT_FLAT enumerates ordered strain pairs as two aligned target/query lists (the
  paired-slot -> two-input binding gxformat2 could not express), FILTER_FROM_FILE drops self-pairs, the
  cleaned+rbest UCSC chain pipeline maps over them, RELABEL_FROM_FILE rewrites A_B->A.B for Phase E. Projection
  block: the same CROSS_PRODUCT_FLAT+FILTER pattern builds the anchor x query grid; Liftoff/triage/merge
  map over it (Liftoff-only, TOGA2 off). Proven bit-identical to per-pair driving on the Pv4 test panel.'
inputs:
  masked_fastas:
    type: collection
    collection_type: list
    doc: softmasked per-strain FASTAs (WF-B), id=strain
  sizes:
    type: collection
    collection_type: list
    doc: per-strain .sizes (WF-B), id=strain
  self_pairs:
    type: data
    doc: txt of self-pair ids (X_X) to exclude
  relabel_map:
    type: data
    doc: tabular A_B<TAB>A.B id map for Phase E
  anchor_assemblies:
    type: collection
    collection_type: list
    doc: 3 anchor unmasked FASTAs (Liftoff reference)
  anchor_gene_gff3s:
    type: collection
    collection_type: list
    doc: 3 anchor gene.gff3 (Liftoff annotation)
  anchor_bed12s:
    type: collection
    collection_type: list
    doc: 3 anchor BED12 (triage/merge ref-bed)
  assemblies:
    type: collection
    collection_type: list
    doc: 5 unmasked FASTAs (Liftoff target = query)
  query_masked:
    type: collection
    collection_type: list
    doc: 5 softmasked FASTAs (triage query-fasta)
  anchor_self_pairs:
    type: data
    doc: txt of anchor self-cell ids (A_A) to exclude
steps:
  xprod_fa:
    tool_id: __CROSS_PRODUCT_FLAT__
    in:
      input_a: masked_fastas
      input_b: masked_fastas
    out:
      output_a: {}
      output_b: {}
  xprod_sz:
    tool_id: __CROSS_PRODUCT_FLAT__
    in:
      input_a: sizes
      input_b: sizes
    out:
      output_a: {}
      output_b: {}
  tgt_fa:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: xprod_fa/output_a
      how|filter_source: self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  qry_fa:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: xprod_fa/output_b
      how|filter_source: self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  tgt_sz:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: xprod_sz/output_a
      how|filter_source: self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  qry_sz:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: xprod_sz/output_b
      how|filter_source: self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  kegalign:
    tool_id: toolshed.g2.bx.psu.edu/repos/richard-burhans/kegalign/kegalign/0.1.2.9+galaxy1
    in:
      target: tgt_fa/output_filtered
      query: qry_fa/output_filtered
    state:
      sequence_options:
        strand_selector: both
      ungapped_extension_options:
        hspthresh: 5000
      gapped_extension_options:
        gappedthresh: 6000
        ydrop: 15000
      interpolation_options:
        inner: 2000
      output_options:
        format:
          format_selector: axt
          axt_type: axt
    out:
      kegalign_output: {}
  batched_lastz:
    tool_id: toolshed.g2.bx.psu.edu/repos/richard-burhans/batched_lastz/batched_lastz/1.04.22+galaxy1
    in:
      input: kegalign/kegalign_output
    out:
      output: {}
  axtchain:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_axtchain/ucsc_axtchain/482+galaxy2
    in:
      in_aln: batched_lastz/output
      in_target: tgt_fa/output_filtered
      in_query: qry_fa/output_filtered
    state:
      linear_gap_options:
        linear_gap: loose
    out:
      out: {}
  chainsort_clean:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainsort/ucsc_chainsort/482+galaxy0
    in:
      in_chain: axtchain/out
    out:
      out: {}
  chainprenet:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainprenet/ucsc_chainprenet/482+galaxy0
    in:
      in_chain: chainsort_clean/out
      target_reference_index_source|in_tar_ref_index: tgt_sz/output_filtered
      query_reference_index_source|in_que_ref_index: qry_sz/output_filtered
    state:
      target_reference_index_source:
        target_reference_index_source_selector: history
      query_reference_index_source:
        query_reference_index_source_selector: history
    out:
      out: {}
  chainnet:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainnet/ucsc_chainnet/482+galaxy0
    in:
      in_chain: chainprenet/out
      target_reference_index_source|in_tar_ref_index: tgt_sz/output_filtered
      query_reference_index_source|in_que_ref_index: qry_sz/output_filtered
    state:
      target_reference_index_source:
        target_reference_index_source_selector: history
      query_reference_index_source:
        query_reference_index_source_selector: history
    out:
      targetNet: {}
  netchainsubset:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_netchainsubset/ucsc_netchainsubset/482+galaxy0
    in:
      in_net: chainnet/targetNet
      in_chain: chainprenet/out
    out:
      out: {}
  chainstitchid_clean:
    tool_id: chainStitchId
    in:
      input: netchainsubset/out
    out:
      output: {}
  rb_swap1:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainswap/ucsc_chainswap/482+galaxy0
    in:
      in_chain: chainstitchid_clean/output
    out:
      out: {}
  rb_sort1:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainsort/ucsc_chainsort/482+galaxy0
    in:
      in_chain: rb_swap1/out
    out:
      out: {}
  rb_net:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainnet/ucsc_chainnet/482+galaxy0
    in:
      in_chain: rb_sort1/out
      target_reference_index_source|in_tar_ref_index: qry_sz/output_filtered
      query_reference_index_source|in_que_ref_index: tgt_sz/output_filtered
    state:
      target_reference_index_source:
        target_reference_index_source_selector: history
      query_reference_index_source:
        query_reference_index_source_selector: history
    out:
      targetNet: {}
  rb_subset:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_netchainsubset/ucsc_netchainsubset/482+galaxy0
    in:
      in_net: rb_net/targetNet
      in_chain: rb_sort1/out
    out:
      out: {}
  rb_stitch:
    tool_id: chainStitchId
    in:
      input: rb_subset/out
    out:
      output: {}
  rb_swap2:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainswap/ucsc_chainswap/482+galaxy0
    in:
      in_chain: rb_stitch/output
    out:
      out: {}
  rb_sort2:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/ucsc_chainsort/ucsc_chainsort/482+galaxy0
    in:
      in_chain: rb_swap2/out
    out:
      out: {}
  relabel_cleaned:
    tool_id: __RELABEL_FROM_FILE__
    in:
      input: chainstitchid_clean/output
      how|labels: relabel_map
    state:
      how:
        how_select: tabular
        strict: false
    out:
      output: {}
  relabel_rbest:
    tool_id: __RELABEL_FROM_FILE__
    in:
      input: rb_sort2/out
      how|labels: relabel_map
    state:
      how:
        how_select: tabular
        strict: false
    out:
      output: {}
  p_grid_fa:
    tool_id: __CROSS_PRODUCT_FLAT__
    in:
      input_a: anchor_assemblies
      input_b: assemblies
    out:
      output_a: {}
      output_b: {}
  p_grid_gff:
    tool_id: __CROSS_PRODUCT_FLAT__
    in:
      input_a: anchor_gene_gff3s
      input_b: assemblies
    out:
      output_a: {}
      output_b: {}
  p_grid_bed:
    tool_id: __CROSS_PRODUCT_FLAT__
    in:
      input_a: anchor_bed12s
      input_b: query_masked
    out:
      output_a: {}
      output_b: {}
  p_anc_fa:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: p_grid_fa/output_a
      how|filter_source: anchor_self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  p_qry_fa:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: p_grid_fa/output_b
      how|filter_source: anchor_self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  p_anc_gff:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: p_grid_gff/output_a
      how|filter_source: anchor_self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  p_anc_bed:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: p_grid_bed/output_a
      how|filter_source: anchor_self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  p_qry_masked:
    tool_id: __FILTER_FROM_FILE__
    in:
      input: p_grid_bed/output_b
      how|filter_source: anchor_self_pairs
    state:
      how:
        how_filter: remove_if_present
    out:
      output_filtered: {}
  p_liftoff:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/liftoff/liftoff/1.6.3+galaxy0
    in:
      target_fasta: p_qry_fa/output_filtered
      reference_fasta: p_anc_fa/output_filtered
      annotation: p_anc_gff/output_filtered
    state:
      chromosome_mapping:
        copy_detection:
          find_copies: true
          copy_min_identity: 0.95
    out:
      liftoff_gff: {}
  p_triage:
    tool_id: phase_c2_triage
    in:
      liftoff_gff: p_liftoff/liftoff_gff
      query_fasta: p_qry_masked/output_filtered
      reference_bed: p_anc_bed/output_filtered
    state:
      query_name: query
      core_identity_min: 0.95
      core_coverage_min: 0.9
      family_identity_min: 0.85
      subtelomere_bp: 100000
    out:
      triage_tsv: {}
      needs_cesar2_bed: {}
      liftoff_clean_gff3: {}
      summary_json: {}
  p_merge:
    tool_id: phase_c4_merge
    in:
      liftoff_clean: p_triage/liftoff_clean_gff3
      ref_bed: p_anc_bed/output_filtered
    state:
      query: query
      toga:
        use_toga: 'no'
    out:
      annotation_gff3: {}
      classification_tsv: {}
outputs:
  cleaned_chains:
    outputSource: relabel_cleaned/output
  rbest_chains:
    outputSource: relabel_rbest/output
  pairwise_axt:
    outputSource: batched_lastz/output
  merged_annotations:
    outputSource: p_merge/annotation_gff3
  classifications:
    outputSource: p_merge/classification_tsv
