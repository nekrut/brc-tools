class: GalaxyWorkflow
label: WF-B softmask (Phase B)
doc: >-
  Phase B soft-masking, maintained-masker edition. Per strain, run four maskers
  over the assembly — dustmasker (DUST), windowmasker (genome-frequency), tantan
  (gentle LC), and fastan (tandem arrays). Each emits a content-annotated BED6
  (name = repeat-unit signature / unit size, score = purity/identity, strand) that
  becomes a UCSC-hub track. The union of the four interval sets is soft-masked into
  the assembly (bedtools maskfasta -soft) and indexed (samtools faidx). Replaces the
  previous sdust+longdust pair (sdust unmaintained + buggy; longdust slow/redundant)
  per the masking-stats benchmark. Collection element identifier = strain throughout.
creator:
  - class: Person
    identifier: https://orcid.org/0000-0002-5987-8032
    name: Anton Nekrutenko
  - class: Person
    name: Claude Opus 4.8
license: MIT
release: "0.2"

inputs:
  assemblies:
    type: collection
    collection_type: list
    doc: Per-strain assembly FASTAs. Element identifier = strain. Every step maps over this.
    position: {top: 170, left: 0}
outputs:
  softmasked_fasta:
    outputSource: maskfasta/output
    doc: Per-strain soft-masked FASTAs (union of all four maskers, lower-cased).
  fasta_index:
    outputSource: faidx/output
    doc: Per-strain .fai indexes for the soft-masked FASTAs.
  dustmasker_bed:
    outputSource: dustmasker/output
    doc: dustmasker low-complexity BED6 (UCSC-hub track).
  windowmasker_bed:
    outputSource: windowmasker/output
    doc: windowmasker masked-interval BED6 (UCSC-hub track).
  tantan_bed:
    outputSource: tantan/output
    doc: tantan low-complexity BED6 (UCSC-hub track).
  fastan_bed:
    outputSource: fastan/output
    doc: fastan tandem-array BED6 (UCSC-hub track).
  masking_table:
    outputSource: masking_table/output
    doc: >-
      Sample x masker table of % genome masked (one row per strain, one column
      per tool + union), from bedtools genomecov pivoted by masking_table. Feeds MultiQC.
  masking_report:
    outputSource: masking_multiqc/html_report
    doc: MultiQC report of per-strain soft-masking proportions per tool (custom-content table).

steps:
  dustmasker:
    tool_id: dustmasker
    label: dustmasker
    doc: NCBI DUST low-complexity -> content-annotated BED6. Maps over assemblies.
    in:
      input: assemblies
    position: {top: 0, left: 300}
    post_job_actions:
      RenameDatasetActionoutput:
        action_arguments:
          newname: 'hub track: dustmasker LC (BED6)'
        action_type: RenameDatasetAction
        output_name: output
      TagDatasetActionoutput:
        action_arguments:
          tags: DustMakser
        action_type: TagDatasetAction
        output_name: output
  windowmasker:
    tool_id: windowmasker
    label: windowmasker
    doc: NCBI WindowMasker genome-frequency repeats -> BED6. Maps over assemblies.
    in:
      input: assemblies
    position: {top: 220, left: 300}
    post_job_actions:
      RenameDatasetActionoutput:
        action_arguments:
          newname: 'hub track: windowmasker repeats (BED6)'
        action_type: RenameDatasetAction
        output_name: output
      TagDatasetActionoutput:
        action_arguments:
          tags: WindowMasker
        action_type: TagDatasetAction
        output_name: output
  tantan:
    tool_id: tantan
    label: tantan
    doc: tantan gentle low-complexity -> BED6. Maps over assemblies.
    in:
      input: assemblies
    position: {top: 660, left: 300}
    post_job_actions:
      RenameDatasetActionoutput:
        action_arguments:
          newname: 'hub track: tantan LC (BED6)'
        action_type: RenameDatasetAction
        output_name: output
      TagDatasetActionoutput:
        action_arguments:
          tags: TanTan
        action_type: TagDatasetAction
        output_name: output
  fastan:
    tool_id: fastan
    label: fastan
    doc: FASTAN tandem arrays -> BED6. Maps over assemblies.
    in:
      input: assemblies
    position: {top: 830, left: 300}
    post_job_actions:
      RenameDatasetActionoutput:
        action_arguments:
          newname: 'hub track: fastan tandem (BED6)'
        action_type: RenameDatasetAction
        output_name: output
      TagDatasetActionoutput:
        action_arguments:
          tags: fastan
        action_type: TagDatasetAction
        output_name: output
  union_cat:
    tool_id: cat1
    label: union_cat
    doc: >-
      Concatenate the four per-strain BED6 interval sets (zipped by element
      identifier) into one set before sort/merge. Galaxy distro tool.
    in:
      input1: dustmasker/output
      queries_0|input2: windowmasker/output
      queries_1|input2: tantan/output
      queries_2|input2: fastan/output
    position: {top: 420, left: 650}
    state:
      queries:
        - input2:
            __class__: ConnectedValue
        - input2:
            __class__: ConnectedValue
        - input2:
            __class__: ConnectedValue
  sort_bed:
    tool_id: bedtools_sortbed
    label: sort_bed
    doc: Sort the concatenated intervals (required before merge). IUC bedtools.
    in:
      input: union_cat/out_file1
    state:
      genome_file_opts:
        genome_file_opts_selector: hist
    position: {top: 420, left: 950}
  merge_bed:
    tool_id: bedtools_mergebed
    label: merge_bed
    doc: Merge/union overlapping intervals across all four maskers. IUC bedtools.
    in:
      input: sort_bed/output
    position: {top: 420, left: 1250}
  maskfasta:
    tool_id: bedtools_maskfastabed
    label: maskfasta
    doc: >-
      Soft-mask the assembly at the merged union intervals (-soft). IUC bedtools.
      fasta = assembly (per strain), bed = merged union (per strain), zipped by strain.
    in:
      fasta: assemblies
      input: merge_bed/output
    state:
      soft: true
    position: {top: 270, left: 1600}
    post_job_actions:
      RenameDatasetActionoutput:
        action_arguments:
          newname: softmasked FASTA (-> WF-C masked_fastas / query_masked)
        action_type: RenameDatasetAction
        output_name: output
      TagDatasetActionoutput:
        action_arguments:
          tags: SoftmaskedFasta
        action_type: TagDatasetAction
        output_name: output
  faidx:
    tool_id: samtools_faidx
    label: faidx
    doc: Index the soft-masked FASTA (.fai). IUC samtools_faidx.
    in:
      input: maskfasta/output
    position: {top: 270, left: 1900}
    post_job_actions:
      RenameDatasetActionoutput:
        action_arguments:
          newname: softmasked FASTA index (.fai)
        action_type: RenameDatasetAction
        output_name: output
      TagDatasetActionoutput:
        action_arguments:
          tags: Softmaskedfai
        action_type: TagDatasetAction
        output_name: output
  sizes_cut:
    tool_id: Cut1
    label: sizes_cut
    doc: chrom<TAB>length from each softmasked .fai (the bedtools genome file). Maps over faidx.
    in:
      input: faidx/output
    state:
      columnList: "c1,c2"
      delimiter: "T"
    position: {top: 270, left: 2200}
  gcov_dust:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/bedtools/bedtools_genomecoveragebed/2.31.1
    label: gcov_dust
    doc: Genome coverage histogram (max depth 1) of dustmasker intervals; maps over strains.
    in:
      input_type|input: dustmasker/output
      input_type|genome_file_opts|genome: sizes_cut/out_file1
    state:
      input_type:
        input_type_select: bed
        genome_file_opts:
          genome_file_opts_selector: hist
      report:
        report_select: hist
        max: 1
    position: {top: 0, left: 2550}
  gcov_window:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/bedtools/bedtools_genomecoveragebed/2.31.1
    label: gcov_window
    doc: Genome coverage (max depth 1) of windowmasker intervals; maps over strains.
    in:
      input_type|input: windowmasker/output
      input_type|genome_file_opts|genome: sizes_cut/out_file1
    state:
      input_type:
        input_type_select: bed
        genome_file_opts:
          genome_file_opts_selector: hist
      report:
        report_select: hist
        max: 1
    position: {top: 220, left: 2550}
  gcov_tantan:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/bedtools/bedtools_genomecoveragebed/2.31.1
    label: gcov_tantan
    doc: Genome coverage (max depth 1) of tantan intervals; maps over strains.
    in:
      input_type|input: tantan/output
      input_type|genome_file_opts|genome: sizes_cut/out_file1
    state:
      input_type:
        input_type_select: bed
        genome_file_opts:
          genome_file_opts_selector: hist
      report:
        report_select: hist
        max: 1
    position: {top: 660, left: 2550}
  gcov_fastan:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/bedtools/bedtools_genomecoveragebed/2.31.1
    label: gcov_fastan
    doc: Genome coverage (max depth 1) of fastan tandem intervals; maps over strains.
    in:
      input_type|input: fastan/output
      input_type|genome_file_opts|genome: sizes_cut/out_file1
    state:
      input_type:
        input_type_select: bed
        genome_file_opts:
          genome_file_opts_selector: hist
      report:
        report_select: hist
        max: 1
    position: {top: 880, left: 2550}
  gcov_union:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/bedtools/bedtools_genomecoveragebed/2.31.1
    label: gcov_union
    doc: Genome coverage (max depth 1) of the merged union intervals; maps over strains.
    in:
      input_type|input: merge_bed/output
      input_type|genome_file_opts|genome: sizes_cut/out_file1
    state:
      input_type:
        input_type_select: bed
        genome_file_opts:
          genome_file_opts_selector: hist
      report:
        report_select: hist
        max: 1
    position: {top: 440, left: 2550}
  masking_table:
    tool_id: masking_table
    label: masking_table
    doc: >-
      Pivot the five per-strain genomecov outputs into one Sample x masker
      percent-masked table (locally-authored tool; reads element identifiers).
      Clean header (no leading '#') so MultiQC custom-content reads it as a table.
    in:
      dustmasker: gcov_dust/output
      windowmasker: gcov_window/output
      tantan: gcov_tantan/output
      fastan: gcov_fastan/output
      union: gcov_union/output
    position: {top: 360, left: 2900}
  masking_multiqc:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/multiqc/multiqc/1.35+galaxy1
    label: masking_multiqc
    doc: MultiQC report rendering the masking_table matrix (custom content, table).
    in:
      results_0|software_cond|input: masking_table/output
    state:
      results:
        - software_cond:
            software: custom_content
            plot_type: table
            section_name: "Soft-masking proportions"
            title: "Per-strain % genome masked"
            description: "Percent of each genome soft-masked by dustmasker, windowmasker, tantan, fastan, and their union (bedtools genomecov)."
    position: {top: 360, left: 3200}
