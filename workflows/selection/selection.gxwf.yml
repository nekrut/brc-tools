class: GalaxyWorkflow
label: WF-H selection (Pv4 Phase H)
license: MIT
creator:
  - class: Person
    identifier: https://orcid.org/0000-0002-5987-8032
    name: Anton Nekrutenko
  - class: Person
    name: Claude Opus 4.8
doc: |
  Phase H of the Pv4 pangenome pipeline: per-gene episodic-selection test
  (HyPhy BUSTED).

  hyphy_busted (IUC) maps over two collections paired by gene
  element_identifier: the per-orthogroup codon alignment (WF-F) and the matching
  per-gene treefile (WF-G). Flags: --srv No --branches All. BUSTED writes a
  fixed-named busted.json; the gene id rides element_identifier, so WF-K derives
  gene id from element_identifier (NOT a parts[-2] dir scheme).

  Run TWICE: once for core_v3 (alignments + trees) and once for core_relaxed.
  Output of each run is a per-gene busted.json list collection. Collapse into
  {set}_busted.tar past the scaling threshold -- and the collapse step renames
  each element's busted.json -> {element_identifier}.json, flat at the tar root
  (done outside this workflow). H output is a SUBSET of the G input (genes
  lacking a treefile / producing invalid JSON are dropped).

  hyphy_busted is an IUC tool that must be installed before this workflow runs.

inputs:
  codon_alignments:
    type: data_collection
    collection_type: list
    doc: |
      Per-orthogroup codon alignments from WF-F, one collection per set
      (core_v3 OR core_relaxed). element_identifier = gene/OG id.
  treefiles:
    type: data_collection
    collection_type: list
    doc: |
      Per-gene treefiles from WF-G, parallel to codon_alignments and paired by
      gene element_identifier (same set).

outputs:
  busted_json:
    outputSource: hyphy_busted/busted_output
    doc: Per-gene BUSTED results (busted.json). Collapse -> {set}_busted.tar (renamed {gene}.json flat).

steps:
  hyphy_busted:
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/hyphy_busted/hyphy_busted/2.5.96+galaxy0
    doc: |
      IUC hyphy_busted 2.5.96+galaxy0. Maps over alignment + tree collections
      paired by gene element_identifier. Verified live: alignment input is
      input_file; the tree (Newick/NHX) input is input_nhx (NOT tree_file);
      --branches is the branch_cond conditional's branch_sel test param
      (value 'All'). Output is busted_output. NOTE: this wrapper version does
      NOT expose --srv, so the impl/09_hyphy.sh '--srv No' cannot be set from
      the GUI; BUSTED runs with its default synonymous-rate-variation model.
      gencodeid defaults to Universal (= genetic code 1).
    in:
      input_file:
        source: codon_alignments
      input_nhx:
        source: treefiles
    state:
      branch_cond:
        branch_sel: All
    out:
      - busted_output
