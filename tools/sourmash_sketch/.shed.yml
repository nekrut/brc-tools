categories:
- Sequence Analysis
description: Compute a sourmash MinHash DNA signature for an assembly
long_description: |
  sourmash sketch dna computes a scaled MinHash signature (k=31,
  scaled=1000) for a nucleotide FASTA assembly. The resulting signature
  is a compact JSON representation used downstream by sourmash compare to
  estimate pairwise genome similarity in pangenome panel construction.
name: sourmash_sketch
owner: nekrut
homepage_url: https://github.com/sourmash-bio/sourmash
