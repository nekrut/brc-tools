description: smoothxg - POA-aware pangenome graph smoother
long_description: |
  smoothxg finds collinear blocks in a variation graph and applies
  partial-order alignment (POA) within each block to smooth out
  small-scale alignment artifacts. This is the POA step in the pggb
  pangenome pipeline.
