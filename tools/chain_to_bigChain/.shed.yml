categories:
- Sequence Analysis
- Genome annotation
description: Convert UCSC chain alignments to bigChain + bigLink BED for assembly hubs
long_description: |
  Converts a UCSC chain pairwise alignment file into the two BED tables required
  to build a bigChain track for an assembly hub, mirroring hgLoadChain -noBin:
  bigChain.bed (bed6+6) with one row per chain and bigLink.bed (bed4+1) with one
  row per aligned block. Plain and gzipped chain inputs are accepted; chains with
  a non-'+' target strand are skipped with a warning.
name: chain_to_bigChain
owner: nekrut
homepage_url: https://github.com/nekrut/brc-tools
remote_repository_url: https://github.com/nekrut/brc-tools/tree/main/tools/chain_to_bigChain
type: unrestricted
