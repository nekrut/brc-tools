categories:
- Sequence Analysis
description: sourmash compare - N×N similarity matrix from a collection of MinHash signatures
long_description: |
  Wraps `sourmash compare`. Given a list collection of sourmash signatures
  (one per strain, e.g. from sourmash sketch), estimates the Jaccard
  similarity between every pair of signatures and writes the resulting
  symmetric N×N matrix as CSV. Signature names become the matrix row and
  column labels; the diagonal carries the 1.0 self-similarity.
