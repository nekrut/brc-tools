description: process_maf - reference-first MAF normalization for mafToBigMaf
long_description: |
  Normalizes a Multiple Alignment Format (MAF) file for downstream
  mafToBigMaf / big MAF track building. For each alignment block it drops
  blocks that lack the reference accession, reorders the s-lines so the
  reference row is first, and sorts the kept blocks by reference (chrom,
  start). Overlapping multiz blocks are preserved.
