categories:
- Sequence Analysis
description: longdust - find low-complexity DNA sequences
long_description: |
  longdust efficiently identifies long low-complexity DNA sequences,
  including centromeric satellite and tandem repeats with moderately long
  motifs, by statistically modeling the k-mer count distribution within a
  context window. Emits a 3-column BED of low-complexity intervals.
name: longdust
owner: nekrut
