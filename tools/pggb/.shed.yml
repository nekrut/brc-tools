description: PGGB - PanGenome Graph Builder
long_description: |
  PGGB wraps the wfmash + seqwish + smoothxg + gfaffix + odgi pipeline
  to build a variation graph from a PanSN-renamed multifasta of
  haplotypes. Standard pangenome construction tool from the pangenome.io
  community.
