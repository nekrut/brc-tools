categories:
- Sequence Analysis
- Assembly
description: Pair strains - enumerate unordered FASTA pairs as a list:paired collection
long_description: |
  From a 'list' collection of one-FASTA-per-strain (element identifier =
  strain name), enumerate all distinct unordered pairs A<B and emit a
  'list:paired' collection where each element is named {A}__vs__{B} with
  forward=A and reverse=B. Feeds all-vs-all pairwise pangenome steps such
  as per-pair wfmash mapping. Options for self-pairs and both directions.
name: pair_strains
owner: nekrut
homepage_url: https://github.com/nekrut/brc-tools/tree/main/tools/pair_strains
