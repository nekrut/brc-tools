description: Collapse walk-preserving shared affixes in a variation graph
long_description: |
  GFAffix discovers and collapses shared prefixes and suffixes in a GFA1
  variation graph without changing the spelled sequences of any walk. It
  is the canonical post-smoothing tidy step in the pggb pipeline.
