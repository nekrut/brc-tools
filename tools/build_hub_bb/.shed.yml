categories:
- Sequence Analysis
- Genome annotation
description: Build UCSC hub BigBed inputs - selection BED12+5 and orthogroup membership BED12
long_description: |
  Consolidates two hardcoded P. vivax pangenome scripts (build_selection_bb.py
  and build_orthogroup_bb.py) into one parameterized tool. Reads an ortholog
  table, reference BED12, chromosome sizes, and one or two HyPhy BUSTED archives
  (strict and optional relaxed) and emits a selection BED12+5 (with orthogroup,
  n_strains, BUSTED p-value, BH-FDR q-value, and gene-family columns) plus an
  orthogroup-membership BED12, converting each to BigBed with bedToBigBed for an
  assembly hub.
